# Flux Next.js web app (dashboard). Requires Traefik on `flux-network` (see docker/traefik/docker-compose.yml).
# Build / restart: run `bash bin/deploy-web.sh` from repo root (Hetzner-friendly; see script for prune/env).
# Or manually: docker compose -f docker/web/docker-compose.yml build
#            docker compose -f docker/web/docker-compose.yml up -d
#
# Routes:
#   https://flux.vsl-base.com       — UI
#   https://api.flux.vsl-base.com — same app (App Router /api/*); set AUTH_URL / NEXTAUTH_URL to the primary UI origin.
# Two Traefik routers (same container): `flux-web-api` is higher priority for PathPrefix(/api) so
# a misbehaving static/catch-all on the same host cannot serve index.html for /api/*. Redeploy to apply.
#
# Required: place a `.env` next to this file (see `.env.example`) with NEXTAUTH_SECRET,
# GITHUB_ID, GITHUB_SECRET, FLUX_ACTIVITY_SECRET (and optional STRIPE_*, CLOUDFLARE_* for /docs Codex AI).

services:
  flux-web:
    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile
    image: flux-web:latest
    container_name: flux-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      AUTH_TRUST_HOST: "true"
      # Primary canonical URL for Auth.js / billing redirects (use the UI host).
      AUTH_URL: ${AUTH_URL:-https://flux.vsl-base.com}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://flux.vsl-base.com}
      # Drives Traefik labels on tenants provisioned by the dashboard
      # (websecure + myresolver via fluxTraefikCertResolverName).
      FLUX_DOMAIN: ${FLUX_DOMAIN:-vsl-base.com}
      # Passed into flux-web-entrypoint.sh so `setpriv` keeps docker.sock access after dropping to nextjs.
      FLUX_DOCKER_SUPPLEMENTARY_GID: ${DOCKER_GID:-996}
    volumes:
      # Control plane needs Docker to provision flux-system + tenant projects.
      - /var/run/docker.sock:/var/run/docker.sock
      # v1_dedicated backup artifacts (defaults: /srv/flux/backups* in container). Entrypoint chowns for user nextjs.
      - flux-web-backups:/srv/flux/backups
      - flux-web-backups-offsite:/srv/flux/backups-offsite
    # The image runs as `nextjs` (non-root). The host socket is root:docker mode 660 — add that
    # group so dockerode can connect. Set DOCKER_GID in `.env` if yours differs (see `.env.example`).
    group_add:
      - "${DOCKER_GID:-996}"
    networks:
      - flux-network
      - flux-v2-shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: flux-network
      traefik.http.routers.flux-web-api.rule: (Host(`flux.vsl-base.com`) || Host(`api.flux.vsl-base.com`)) && PathPrefix(`/api`)
      traefik.http.routers.flux-web-api.entrypoints: websecure
      traefik.http.routers.flux-web-api.tls: "true"
      traefik.http.routers.flux-web-api.tls.certresolver: myresolver
      traefik.http.routers.flux-web-api.priority: "100"
      traefik.http.routers.flux-web-api.service: flux-web
      # HTTP entrypoint mirror: required when an upstream proxy forwards to Traefik over plain HTTP.
      traefik.http.routers.flux-web-api-http.rule: (Host(`flux.vsl-base.com`) || Host(`api.flux.vsl-base.com`)) && PathPrefix(`/api`)
      traefik.http.routers.flux-web-api-http.entrypoints: web
      traefik.http.routers.flux-web-api-http.priority: "100"
      traefik.http.routers.flux-web-api-http.service: flux-web
      traefik.http.routers.flux-web.rule: Host(`flux.vsl-base.com`) || Host(`api.flux.vsl-base.com`)
      traefik.http.routers.flux-web.entrypoints: websecure
      traefik.http.routers.flux-web.tls: "true"
      traefik.http.routers.flux-web.tls.certresolver: myresolver
      traefik.http.routers.flux-web.priority: "1"
      traefik.http.routers.flux-web.service: flux-web
      traefik.http.routers.flux-web-http.rule: Host(`flux.vsl-base.com`) || Host(`api.flux.vsl-base.com`)
      traefik.http.routers.flux-web-http.entrypoints: web
      traefik.http.routers.flux-web-http.priority: "1"
      traefik.http.routers.flux-web-http.service: flux-web
      traefik.http.services.flux-web.loadbalancer.server.port: "3000"

networks:
  flux-network:
    external: true
  # Shared v2 data-plane network — required so flux-web can reach flux-postgres-v2
  # for engine-v2 tenant bootstrap (FLUX_SHARED_POSTGRES_URL → flux-postgres-v2:5432).
  flux-v2-shared:
    external: true

volumes:
  flux-web-backups:
  flux-web-backups-offsite:
