# Traefik edge proxy for Flux (container name: flux-gateway).
# Run from this directory so ./letsencrypt resolves next to this file.
# Requires `flux-network` (Flux creates it on first provision, or: docker network create flux-network).
#
#   docker compose up -d
#
# Control plane: `FLUX_DOMAIN` or remote `DOCKER_HOST` (e.g. ssh://) enables myresolver (see @flux/core);
#    `FLUX_TRAEFIK_NO_EDGE=1` if you need `web` labels only. Override resolver with `FLUX_TRAEFIK_CERTRESOLVER`.
#
# Image: use Traefik >= v3.6.1. Older lines (e.g. v3.1) use Docker API 1.24; modern Engine rejects that.
# The DOCKER_API_VERSION env is ignored for Traefik’s built-in client — upgrading Traefik is the real fix
# (see https://github.com/traefik/traefik/issues/12253 ).

services:
  traefik:
    image: traefik:v3.6.7
    container_name: flux-gateway
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=flux-network"
      - "--providers.docker.httpClientTimeout=300s"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Auto-redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # ACME
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=justin@vsl-base.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - flux-network

networks:
  flux-network:
    external: true
