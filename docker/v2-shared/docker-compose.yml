# Flux v2 shared data-plane stack
#
# Services:
# - postgres-v2   : shared PostgreSQL cluster
# - pgbouncer     : transaction pooler
# - postgrest-pool: shared PostgREST upstream (private to gateway)
#
# Important JWT handshake invariant:
# - Set FLUX_GATEWAY_JWT_SECRET in your environment or env_file once.
# - Gateway uses FLUX_GATEWAY_JWT_SECRET.
# - PostgREST PGRST_JWT_SECRET is wired from that same variable below.

services:
  postgres-v2:
    image: postgres:16-alpine
    container_name: flux-postgres-v2
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SHARED_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${SHARED_POSTGRES_PASSWORD:?set SHARED_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SHARED_POSTGRES_DB:-postgres}
    volumes:
      - postgres-v2-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - flux-v2-shared

  pgbouncer:
    image: bitnami/pgbouncer:1.24.1
    container_name: flux-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres-v2:
        condition: service_healthy
    environment:
      POSTGRESQL_HOST: postgres-v2
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${PGB_BACKEND_USER:-postgres}
      POSTGRESQL_PASSWORD: ${PGB_BACKEND_PASSWORD:?set PGB_BACKEND_PASSWORD}
      PGBOUNCER_DATABASE: ${PGB_DATABASE:-postgres}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: ${PGB_MAX_CLIENT_CONN:-1000}
      PGBOUNCER_DEFAULT_POOL_SIZE: ${PGB_DEFAULT_POOL_SIZE:-100}
      PGBOUNCER_AUTH_TYPE: ${PGB_AUTH_TYPE:-scram-sha-256}
      PGBOUNCER_ADMIN_USERS: ${PGB_ADMIN_USERS:-postgres}
    networks:
      - flux-v2-shared

  postgrest-pool:
    image: postgrest/postgrest:v12.2.12
    container_name: flux-postgrest-pool
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_started
    environment:
      # Keep tenant schemas out of this list (security invariant).
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public}
      PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE:-authenticator}
      PGRST_DB_URI: postgres://${PGRST_DB_USER:-authenticator}:${PGRST_DB_PASSWORD:?set PGRST_DB_PASSWORD}@pgbouncer:6432/${PGRST_DB_NAME:-postgres}
      # Handshake: same secret material as gateway FLUX_GATEWAY_JWT_SECRET.
      PGRST_JWT_SECRET: ${FLUX_GATEWAY_JWT_SECRET:?set FLUX_GATEWAY_JWT_SECRET}
      PGRST_DB_CHANNEL_ENABLED: "true"
      PGRST_DB_POOL: ${PGRST_DB_POOL:-50}
      PGRST_SERVER_PORT: 3000
    expose:
      - "3000"
    networks:
      - flux-v2-shared
      - flux-network

volumes:
  postgres-v2-data:

networks:
  flux-v2-shared:
    name: flux-v2-shared
  flux-network:
    external: true
