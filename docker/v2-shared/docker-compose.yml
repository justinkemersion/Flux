# Flux v2 shared data-plane stack
#
# Services:
# - postgres-v2   : shared PostgreSQL cluster
# - pgbouncer     : transaction pooler
# - postgrest-pool: shared PostgREST upstream (private to gateway)
#
# Important JWT handshake invariant:
# - Set FLUX_GATEWAY_JWT_SECRET in your environment or env_file once.
# - Gateway uses FLUX_GATEWAY_JWT_SECRET.
# - PostgREST PGRST_JWT_SECRET is wired from that same variable below.

services:
  postgres-v2:
    image: postgres:16-alpine
    container_name: flux-postgres-v2
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SHARED_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${SHARED_POSTGRES_PASSWORD:?set SHARED_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SHARED_POSTGRES_DB:-postgres}
    volumes:
      - postgres-v2-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
    # flux-v2-shared: private network for inter-service comms within this stack.
    # flux-network: shared external network required so flux-web (dashboard) can
    #   reach flux-postgres-v2 via FLUX_SHARED_POSTGRES_URL for engine-v2 DDL
    #   bootstrapping.  postgres-v2 has no Traefik labels and no published ports,
    #   so it is not reachable from outside the Docker host.
    networks:
      - flux-v2-shared
      - flux-network

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: flux-pgbouncer
    restart: unless-stopped
    depends_on:
      postgres-v2:
        condition: service_healthy
    environment:
      DB_HOST: postgres-v2
      DB_PORT: 5432
      DB_USER: ${PGB_BACKEND_USER:-postgres}
      DB_PASSWORD: ${PGB_BACKEND_PASSWORD:?set PGB_BACKEND_PASSWORD}
      DB_NAME: ${PGB_DATABASE:-postgres}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: ${PGB_MAX_CLIENT_CONN:-1000}
      DEFAULT_POOL_SIZE: ${PGB_DEFAULT_POOL_SIZE:-100}
      AUTH_TYPE: ${PGB_AUTH_TYPE:-scram-sha-256}
      ADMIN_USERS: ${PGB_ADMIN_USERS:-postgres}
      LISTEN_PORT: 6432
    # flux-v2-shared: communicates with postgres-v2 on the private stack network.
    # flux-network: allows flux-web to reach pgbouncer:6432 as an alternative
    #   bootstrap connection point if FLUX_SHARED_POSTGRES_URL is configured to
    #   use PgBouncer instead of the raw postgres port.
    networks:
      - flux-v2-shared
      - flux-network

  postgrest-pool:
    image: postgrest/postgrest:v12.2.12
    container_name: flux-postgrest-pool
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_started
    environment:
      # Dynamic schema list — populated at runtime by flux_postgrest_config().
      # PGRST_DB_SCHEMAS is intentionally left unset here; the pre-config hook
      # queries pg_namespace for all t_*_api schemas on every "reload config"
      # notification so new tenants become visible without restarting PostgREST.
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-public}
      PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE:-authenticator}
      PGRST_DB_URI: postgres://${PGRST_DB_USER:-authenticator}:${PGRST_DB_PASSWORD:?set PGRST_DB_PASSWORD}@pgbouncer:6432/${PGRST_DB_NAME:-postgres}
      # Handshake: same secret material as gateway FLUX_GATEWAY_JWT_SECRET.
      PGRST_JWT_SECRET: ${FLUX_GATEWAY_JWT_SECRET:?set FLUX_GATEWAY_JWT_SECRET}
      # Pre-config hook: dynamically builds db-schemas from pg_namespace on reload.
      # Installed by bootstrapSharedCluster() (run once via deploy-v2-shared.sh).
      PGRST_DB_PRE_CONFIG: ${PGRST_DB_PRE_CONFIG:-public.flux_postgrest_config}
      # Pre-request hook: sets SET LOCAL search_path + statement_timeout per
      # transaction using the JWT role claim.  Works correctly in PgBouncer
      # transaction-pooling mode (ALTER ROLE SET is a session-only mechanism).
      PGRST_DB_PRE_REQUEST: ${PGRST_DB_PRE_REQUEST:-public.flux_set_tenant_context}
      PGRST_DB_CHANNEL_ENABLED: "true"
      PGRST_DB_POOL: ${PGRST_DB_POOL:-50}
      PGRST_SERVER_PORT: 3000
    expose:
      - "3000"
    networks:
      - flux-v2-shared
      - flux-network

volumes:
  postgres-v2-data:

networks:
  flux-v2-shared:
    name: flux-v2-shared
  flux-network:
    external: true
