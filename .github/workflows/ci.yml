name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Guardrails after refactors: stale imports, missing re-exports, CLI bundle, nested test coverage.
      - name: Architecture guardrails
        run: pnpm check:architecture

      - name: Typecheck @flux/core
        run: pnpm --filter @flux/core exec tsc --noEmit

      - name: Build @flux/cli
        run: pnpm --filter @flux/cli build

      - name: Typecheck dashboard
        run: pnpm --filter dashboard exec tsc --noEmit

      - name: Run workspace tests
        run: pnpm test

  # Opt-in: set repo variable FLUX_SMOKE_CI=true and repository secrets
  # FLUX_SMOKE_GATEWAY_URL + FLUX_SMOKE_KNOWN_HOST (optional FLUX_SMOKE_BEARER).
  # Runs only on push to main/master after unit tests pass — PRs stay fast.
  v2-gateway-smoke:
    name: V2 gateway smoke (opt-in)
    runs-on: ubuntu-latest
    needs: test
    if: >-
      vars.FLUX_SMOKE_CI == 'true' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: GET / through gateway (known Host)
        env:
          FLUX_SMOKE_GATEWAY_URL: ${{ secrets.FLUX_SMOKE_GATEWAY_URL }}
          FLUX_SMOKE_KNOWN_HOST: ${{ secrets.FLUX_SMOKE_KNOWN_HOST }}
          FLUX_SMOKE_BEARER: ${{ secrets.FLUX_SMOKE_BEARER }}
        run: ./bin/e2e-v2-shared-smoke.sh
